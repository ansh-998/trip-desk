version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'owner'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      prefix-scope: 'deps'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    labels:
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      prefix-scope: 'actions'
